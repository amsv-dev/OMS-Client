services:
  # InfluxDB Local - Armazena métricas localmente para resiliência
  influxdb-local:
    image: influxdb:2.7-alpine
    container_name: client-influxdb
    restart: always
    ports:
      - "${CLIENT_INFLUXDB_HTTP_PORT:-8087}:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=localpass123
      - DOCKER_INFLUXDB_INIT_ORG=client
      - DOCKER_INFLUXDB_INIT_BUCKET=metrics
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=client-local-token
    volumes:
      - influxdb-local-data:/var/lib/influxdb2
    networks:
      - client-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Telegraf - Coleta métricas do sistema e envia para InfluxDB local
  telegraf:
    image: telegraf:alpine
    container_name: client-telegraf
    restart: always
    env_file:
      - .env
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
      - TENANT_ID=${TENANT_ID:-unknown}
      - ASSET_ID=${ASSET_ID:-unknown}
      - RUNTIME_ASSET_ID=${RUNTIME_ASSET_ID:-${ASSET_ID:-unknown}}
      - LOGICAL_ASSET_ID=${LOGICAL_ASSET_ID:-}
      - COLLECTOR_TYPE=${COLLECTOR_TYPE:-telegraf}
      - ORIGIN_SCOPE=${ORIGIN_SCOPE:-local}
      - SERVICE_TYPE=${SERVICE_TYPE:-host}
      - SITE_CODE=${SITE_CODE:-${ASSET_ID:-unknown}}
      - OBS_ENVIRONMENT=${OBS_ENVIRONMENT:-prod}
      - DB_REMOTE_COLLECTORS_ENABLED=${DB_REMOTE_COLLECTORS_ENABLED:-false}
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ./telegraf/conf.d:/etc/telegraf/telegraf.d:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
    command:
      - telegraf
      - --config
      - /etc/telegraf/telegraf.conf
      - --config-directory
      - /etc/telegraf/telegraf.d
      - --watch-config
      - poll
    depends_on:
      influxdb-local:
        condition: service_healthy
    networks:
      - client-network

  # Customer Agent - Replica métricas, processa alertas, executa comandos
  # CLIENT_IMAGE_REGISTRY: ghcr.io público (pull sem login) ou override para testes
  customer-agent:
    image: ${CLIENT_IMAGE_REGISTRY:-ghcr.io/amsv-dev}/oms-customer-agent:${OMS_IMAGE_TAG:-latest}
    container_name: client-customer-agent
    restart: always
    env_file:
      - .env
    environment:
      # Identidade runtime
      - TENANT_ID=${TENANT_ID:-unknown}
      - ASSET_ID=${ASSET_ID:-unknown}
      - RUNTIME_ASSET_ID=${RUNTIME_ASSET_ID:-${ASSET_ID:-unknown}}
      - LOGICAL_ASSET_ID=${LOGICAL_ASSET_ID:-}
      - COLLECTOR_TYPE=${COLLECTOR_TYPE:-telegraf}
      - ORIGIN_SCOPE=${ORIGIN_SCOPE:-local}
      - SERVICE_TYPE=${SERVICE_TYPE:-host}
      - SITE_CODE=${SITE_CODE:-${ASSET_ID:-unknown}}
      - OBS_ENVIRONMENT=${OBS_ENVIRONMENT:-prod}
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:${LOCAL_RUNTIME_API_PORT:-5808}
      
      # Solace - Comunicação com cloud layer
      - SOLACE__HOST=${SOLACE__HOST:-192.168.56.30}
      - SOLACE__PORT=${SOLACE__PORT:-1883}
      - SOLACE__VPN=${SOLACE__VPN:-default}
      - SOLACE__USERNAME=${SOLACE__USERNAME:-default}
      - SOLACE__PASSWORD=${SOLACE__PASSWORD:-default}
      - METRICS_TOPIC_PREFIX=${METRICS_TOPIC_PREFIX:-oms.metrics.frames}
      - METRICS_ALLOWED_MEASUREMENTS=${METRICS_ALLOWED_MEASUREMENTS:-cpu,mem,disk,diskio,system,net,processes,postgresql,mysql,sqlserver}
      - CENTRAL_API_URL=${CENTRAL_API_URL:-}
      - ASSESSMENT_TOKEN=${ASSESSMENT_TOKEN:-}
      - LOGICAL_ASSET_SYNC_INTERVAL_SECONDS=${LOGICAL_ASSET_SYNC_INTERVAL_SECONDS:-60}
      - LOGICAL_COLLECTOR_CONF_DIR=/app/telegraf-conf.d
      - LOGICAL_SECRET_STORE_PATH=/app/secrets/logical-secret-store.json
      
      # InfluxDB Local - Leitura de métricas
      - INFLUXDB_LOCAL_URL=http://influxdb-local:8086
      - INFLUXDB_LOCAL_TOKEN=client-local-token
      - INFLUXDB_LOCAL_ORG=client
      - INFLUXDB_LOCAL_BUCKET=metrics
    depends_on:
      influxdb-local:
        condition: service_healthy
    volumes:
      - ../automation/playbooks:/app/playbooks:ro
      - ./telegraf/conf.d:/app/telegraf-conf.d
      - ./secrets:/app/secrets
    networks:
      - client-network
      - oms-shared-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Promtail - Logs de sistema da VM client para Central Loki (multi-tenant)
  promtail:
    image: grafana/promtail:latest
    container_name: client-promtail
    restart: always
    environment:
      - TENANT_ID=${TENANT_ID:-unknown}
      - ASSET_ID=${ASSET_ID:-unknown}
      - LOCAL_RUNTIME_API_URL=${LOCAL_RUNTIME_API_URL:-/runtime-local}
      - LOKI_URL=${LOKI_URL:-http://192.168.56.10:3100/loki/api/v1/push}
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    networks:
      - client-network

  # Assessment UI - Client onboarding frontend
  assessment:
    image: ${CLIENT_IMAGE_REGISTRY:-ghcr.io/amsv-dev}/oms-assessment:${OMS_IMAGE_TAG:-latest}
    container_name: client-assessment
    restart: always
    ports:
      - "${CLIENT_ASSESSMENT_HTTP_PORT:-3002}:80"
    environment:
      - TENANT_ID=${TENANT_ID:-unknown}
      - ASSET_ID=${ASSET_ID:-unknown}
    depends_on:
      - customer-agent
    networks:
      - client-network

  # NOTE: Remote execution via CommandReceiverService (Solace)
  # See documentacao/decisoes/ADR-001-remote-execution.md

  # Demo Triggers - Serviço de teste para disparar eventos (apenas dev)
  demo-triggers:
    image: node:20-alpine
    container_name: client-demo-triggers
    restart: always
    working_dir: /app
    volumes:
      - ../demo-triggers:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "${CLIENT_DEMO_TRIGGERS_PORT:-3101}:3001"
    environment:
      - SOLACE__HOST=192.168.56.30
    networks:
      - client-network
    profiles:
      - dev

volumes:
  influxdb-local-data:
    external: true
    name: compose_influxdb-local-data

networks:
  client-network:
    driver: bridge
  oms-shared-network:
    external: true
